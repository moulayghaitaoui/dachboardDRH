<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحليل مسابقة مدراء التكوين المهني 2026</title>

    <style>
        /* تنسيق أزرار التصفية */
        .filter-tabs {
            display: flex;
            background: #eee;
            padding: 5px;
            border-radius: 10px;
            gap: 5px;
        }

        .tab-btn {
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: 0.3s;
            background: transparent;
            color: #666;
        }

        .tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .badge-type {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: bold;
        }

        .type-insfp {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .type-cfpa {
            background: #e3f2fd;
            color: #1976d2;
        }


        :root {
            --primary: #185FA5;
            --secondary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light: #f4f7fa;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }


        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light);
            color: var(--secondary);
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Header */
        /* التنسيق المحدث للهيدر */
        header {
            background: var(--white);
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* لتوزيع العناصر على الأطراف */
            border-top: 6px solid var(--primary);
            text-align: center;
        }

        .header-logo {
            width: 100px;
            /* حجم الشعار */
            height: auto;
        }

        .header-center-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header-official h2 {
            font-size: 18px;
            color: var(--secondary);
            margin: 0;
            font-weight: 800;
        }

        .header-official h3 {
            font-size: 16px;
            color: var(--secondary);
            margin: 0;
            font-weight: bold;
        }

        .header-content h1 {
            font-size: 22px;
            color: var(--primary);
            margin: 10px 0 5px 0;
        }

        /* تحسين التجاوب مع الشاشات الصغيرة */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 20px;
            }

            .header-logo {
                width: 70px;
                margin-bottom: 10px;
            }
        }

        /* KPI Cards */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .kpi-card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            border-bottom: 3px solid var(--primary);
        }

        .kpi-card label {
            display: block;
            font-size: 12px;
            color: #95a5a6;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .kpi-card span {
            font-size: 30px;
            font-weight: 800;
            color: var(--primary);
        }

        /* Main Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1.2fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .panel {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .panel h2 {
            font-size: 16px;
            margin-bottom: 20px;
            padding-right: 12px;
            border-right: 4px solid var(--primary);
            color: var(--secondary);
        }

        /* Charts Height */
        #mapdiv {
            width: 100%;
            height: 500px;
        }

        .chart-container {
            height: 250px;
            margin-bottom: 20px;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th {
            background: #f8fafc;
            padding: 12px;
            font-size: 13px;
            color: #64748b;
            border-bottom: 2px solid #edf2f7;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #edf2f7;
            font-size: 14px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-m {
            background: #e1effe;
            color: #1e429f;
        }

        .badge-f {
            background: #fde2e1;
            color: #9b1c1c;
        }

        /* Modal (Popup) */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 25px;
            border-radius: 15px;
            width: 50%;
            box-shadow: var(--shadow);
            animation: slideDown 0.4s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close {
            float: left;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
        }

        .close:hover {
            color: var(--danger);
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <img src="logo.jpeg" alt="شعار الوزارة" class="header-logo">

            <div class="header-center-content">
                <div class="header-official">
                    <h2>الجمهورية الجزائرية الديمقراطية الشعبية</h2>
                    <h3>وزارة التكوين والتعليم المهنيين</h3>
                </div>
                <div class="header-content">
                    <h1> لوحة التحكم: مسابقة مدراء التكوين المهني 2026</h1>

                </div>
            </div>

            <img src="logo.jpeg" alt="شعار الوزارة" class="header-logo">
        </header>

        <div class="kpi-row">
            <div class="kpi-card" style="border-right: 4px solid var(--primary);">
                <label>إجمالي المؤسسات</label>
                <span>1,730</span>
            </div>
            <div class="kpi-card" style="border-right: 4px solid #8e44ad;">
                <label>إجمالي الموظفين</label>
                <span style="color: #8e44ad;">82,049</span>
            </div>
            <div class="kpi-card" style="border-right: 4px solid #2980b9;">
                <label>ذكور (55%)</label>
                <span style="color: #2980b9;">45,106</span>
            </div>
            <div class="kpi-card" style="border-right: 4px solid #e74c3c;">
                <label>إناث (45%)</label>
                <span style="color: #e74c3c;">36,943</span>
            </div>
            <div class="kpi-card" style="border-right: 4px solid var(--warning);">
                <label>ذوو الاحتياجات الخاصة</label>
                <span style="color: var(--warning);">442</span>
            </div>
        </div>

        <div class="filter-tabs" style="margin-bottom: 25px; justify-content: center; padding: 10px; background: white; box-shadow: var(--shadow);">
            <a href="index.html" class="tab-btn active" style="text-decoration: none; font-size: 16px;">الرئيسية</a>
            <a href="sdp.html" class="tab-btn" style="text-decoration: none; color: var(--secondary); font-size: 16px;">المديرية الفرعية للمستخدمين</a>
            <a href="sdff.html" class="tab-btn" style="text-decoration: none; color: var(--secondary); font-size: 16px;">المديرية الفرعية لتكوين المكونين</a>
            <a href="sdrp.html" class="tab-btn" style="text-decoration: none; color: var(--secondary); font-size: 16px;">المديرية الفرعية لتجديد المعارف وتحسين المستوى</a>
        </div>
        </div>







        

    </div>

</body>

</html>
